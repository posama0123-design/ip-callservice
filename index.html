<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETRIS - Selection Screen</title>
    <style>
        /* 全体のレイアウト設定 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* 背景は真っ黒 */
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        /* テトリスロゴのスタイル */
        .logo {
            font-size: 100px;
            font-weight: 900;
            margin-bottom: 60px;
            letter-spacing: 8px;
            text-transform: uppercase;
            /* ゲーミング風のグローエフェクト */
            text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff, 0 0 40px #00d2ff;
            animation: pulse 2.5s infinite alternate;
        }

        @keyframes pulse {
            0% {
                text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff;
                transform: scale(1);
            }
            100% {
                text-shadow: 0 0 20px #ff0055, 0 0 40px #ff0055;
                transform: scale(1.05);
            }
        }

        /* ボタンを包むグループ */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }

        /* 共通ボタンスタイル */
        .btn {
            width: 280px;
            padding: 18px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            border: 4px solid #fff;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            transition: all 0.3s ease;
            border-radius: 12px;
            text-transform: uppercase;
            outline: none;
        }

        /* 1つ目のボタン (NORMAL) */
        .normal-btn:hover {
            background-color: #00d2ff;
            box-shadow: 0 0 30px #00d2ff;
            border-color: #00d2ff;
            color: #000;
        }

        /* 2つ目のボタン (HARD) */
        .hard-btn:hover {
            background-color: #ff0055;
            box-shadow: 0 0 30px #ff0055;
            border-color: #ff0055;
            color: #000;
        }

        /* クリックした時の沈む動き */
        .btn:active {
            transform: scale(0.9);
        }

        /* 背景に少しドット模様を入れてレトロ感を出す（隠し味） */
        .bg-dots {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, #222 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="bg-dots"></div>

    <div class="container">
        <h1 class="logo">TETRIS</h1>
        
        <div class="button-group">
            <button onclick="navigate('nomal.html')" class="btn normal-btn">NORMAL</button>
            
            <button onclick="navigate('hard.html')" class="btn hard-btn">HARD</button>
        </div>
    </div>

    <script>
        // ボタンを押した時の処理
        function navigate(page) {
            console.log("Navigating to: " + page);
            window.location.href = page;
        }
    </script>

</body>
</html>
