<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>IP-callservice Tetris - Online Battle</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .game-layout { display: flex; gap: 40px; align-items: flex-start; }
        .field-container { border: 4px solid #444; background: #000; position: relative; }
        .enemy-field { border: 4px solid #833; opacity: 0.8; }
        .side-panel { display: flex; flex-direction: column; gap: 10px; width: 80px; }
        .info-box { background: #222; padding: 10px; border-radius: 6px; text-align: center; border: 1px solid #333; }
        .info-label { font-size: 10px; color: #888; }
        .info-value { font-size: 18px; font-weight: bold; color: #0dc2ff; }
        canvas { display: block; }
        #settings-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 25px; border: 1px solid #0dc2ff; z-index: 100; }
        .player-label { text-align: center; font-weight: bold; margin-bottom: 5px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="game-layout">
    <div>
        <div class="player-label" style="color:#0dc2ff">YOU</div>
        <div class="game-layout" style="gap:10px">
            <div class="side-panel">
                <div class="info-box"><div class="info-label">HOLD</div><canvas id="hold-canvas" width="80" height="80"></canvas></div>
            </div>
            <div class="field-container">
                <canvas id="tetris" width="250" height="500"></canvas>
            </div>
        </div>
    </div>

    <div>
        <div class="player-label" style="color:#ff4444">ENEMY</div>
        <div class="field-container enemy-field">
            <canvas id="enemy-tetris" width="250" height="500"></canvas>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyAWHrtJVR6ZbyzI5JvXcfc6demV9DTD0cw",
    authDomain: "samon-4a57a.firebaseapp.com",
    databaseURL: "https://samon-4a57a-default-rtdb.firebaseio.com",
    projectId: "samon-4a57a",
    storageBucket: "samon-4a57a.firebasestorage.app",
    messagingSenderId: "186690963747",
    appId: "1:186690963747:web:3b29ffcc9b643d2f302496"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// IDの生成（簡易版：本来はログインなどで固定する）
const myId = "player_" + Math.floor(Math.random() * 1000);
let enemyId = null;

// ゲーム状態
let isGameOver = false;

// --- テトリス本体ロジック (抜粋・改造) ---
const canvas = document.getElementById('tetris');
const context = canvas.getContext('2d');
const enemyCanvas = document.getElementById('enemy-tetris');
const enemyCtx = enemyCanvas.getContext('2d');
context.scale(25, 25);
enemyCtx.scale(25, 25);

// ゴーストの描画を強化
function drawMatrix(matrix, offset, ctx, isGhost = false) {
    const colors = [null, '#00f0f0', '#0000f0', '#f0a000', '#f0f000', '#00f000', '#a000f0', '#f00000'];
    matrix.forEach((row, y) => {
        row.forEach((val, x) => {
            if (val !== 0) {
                if (isGhost) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)'; // 薄い色で塗りつぶし
                    ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.lineWidth = 0.05;
                    ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                } else {
                    ctx.fillStyle = colors[val];
                    ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 0.05;
                    ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                }
            }
        });
    });
}

// Firebaseへの同期送信
function syncToFirebase() {
    if (isGameOver) return;
    set(ref(db, `rooms/battle/players/${myId}`), {
        arena: arena,
        pos: player.pos,
        matrix: player.matrix,
        lost: false
    });
}

// ゲームオーバー処理
function triggerGameOver() {
    isGameOver = true;
    set(ref(db, `rooms/battle/players/${myId}/lost`), true);
    alert("負けました...");
}

// 相手データの監視
onValue(ref(db, `rooms/battle/players`), (snapshot) => {
    const players = snapshot.val();
    for (let id in players) {
        if (id !== myId) {
            enemyId = id;
            const data = players[id];
            // 相手の画面を描画
            drawEnemy(data);
            if (data.lost && !isGameOver) {
                alert("相手が死んだ！あなたの勝ちです！");
                isGameOver = true;
            }
        }
    }
});

function drawEnemy(data) {
    enemyCtx.fillStyle = '#000';
    enemyCtx.fillRect(0, 0, 10, 20);
    if (data.arena) drawMatrix(data.arena, {x:0, y:0}, enemyCtx);
    if (data.matrix && data.pos) drawMatrix(data.matrix, data.pos, enemyCtx);
}

// ※ここに元のテトリスのロジック（playerMove, arenaSweep等）を結合
// update関数の中で syncToFirebase() を呼び出すようにします。
</script>
</body>
</html>
