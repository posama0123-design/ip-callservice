<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Walkie-Talkie</title>
    <style>
        :root {
            --body-color: #2c3e50;
            --accent-color: #e74c3c;
            --screen-color: #95a5a6;
        }

        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        /* トランシーバー本体 */
        .walkie-talkie {
            position: relative;
            width: 220px;
            height: 400px;
            background: var(--body-color);
            border-radius: 30px 30px 50px 50px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* アンテナ */
        .antenna {
            position: absolute;
            top: -60px;
            left: 40px;
            width: 15px;
            height: 80px;
            background: #1a252f;
            border-radius: 5px;
        }

        /* 液晶画面 */
        .screen {
            width: 80%;
            height: 60px;
            background: var(--screen-color);
            margin-top: 40px;
            border-radius: 5px;
            border: 4px solid #1a252f;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: #2c3e50;
            text-align: center;
        }

        /* スピーカー部分 */
        .speaker {
            width: 70%;
            height: 100px;
            margin: 30px 0;
            background-image: radial-gradient(#1a252f 2px, transparent 2px);
            background-size: 10px 10px;
        }

        /* PTTボタン（プッシュ・トゥ・トーク） */
        #ptt-button {
            width: 120px;
            height: 120px;
            background: var(--accent-color);
            border: 6px solid #c0392b;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            transition: all 0.1s;
            box-shadow: 0 6px 0 #c0392b;
            user-select: none;
            -webkit-user-select: none;
        }

        #ptt-button:active {
            box-shadow: 0 0px 0 #c0392b;
            transform: translateY(6px);
            background: #ff5e4d;
        }

        #ptt-button:disabled {
            background: #7f8c8d;
            border-color: #95a5a6;
            box-shadow: none;
            cursor: not-allowed;
        }

        .status-msg {
            margin-top: 15px;
            color: #ecf0f1;
            font-size: 0.8rem;
        }

        /* 通信中の演出 */
        .transmitting { background: #ffeb3b !important; }
        .receiving { background: #4caf50 !important; color: white !important; }

    </style>
</head>
<body>

    <div class="walkie-talkie">
        <div class="antenna"></div>
        <div class="screen" id="display">OFFLINE</div>
        <div class="speaker"></div>
        <button id="ptt-button" disabled>PUSH</button>
        <div class="status-msg" id="sub-status">Initializing...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // あなたのFirebase設定
        const firebaseConfig = {
            apiKey: "AIzaSyBaMe4Cz_3W75F5NCtioAguONgukg3-k0g",
            authDomain: "my-call-14d70.firebaseapp.com",
            databaseURL: "https://my-call-14d70-default-rtdb.firebaseio.com",
            projectId: "my-call-14d70",
            storageBucket: "my-call-14d70.firebasestorage.app",
            messagingSenderId: "769393584037",
            appId: "1:769393584037:web:279aa04477f2649230ea4c",
            measurementId: "G-EXHXKKRT56"
        };

        // Firebase初期化
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const talkRef = ref(db, 'channel/room1/isTalking');

        const pttButton = document.getElementById('ptt-button');
        const display = document.getElementById('display');
        const subStatus = document.getElementById('sub-status');

        let localStream;
        let mediaRecorder;

        // --- マイクの初期化 ---
        async function initApp() {
            try {
                // マイク権限の取得
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                pttButton.disabled = false;
                display.innerText = "READY";
                subStatus.innerText = "Ch: Room 1 / Online";

                setupEventListeners();
                observeChannel();
            } catch (err) {
                console.error("Mic Error:", err);
                display.innerText = "ERROR";
                subStatus.innerText = "Microphone access denied.";
            }
        }

        // --- イベントの登録 ---
        function setupEventListeners() {
            // ボタンを押した時 (送信開始)
            const startTalking = () => {
                set(talkRef, {
                    status: true,
                    user: "User_" + Math.floor(Math.random() * 1000) // 簡易的なID
                });
                display.innerText = "TALKING...";
                display.classList.add('transmitting');
            };

            // ボタンを離した時 (送信終了)
            const stopTalking = () => {
                set(talkRef, {
                    status: false,
                    user: null
                });
                display.innerText = "READY";
                display.classList.remove('transmitting');
            };

            // マウスとタッチ両対応
            pttButton.addEventListener('mousedown', startTalking);
            pttButton.addEventListener('mouseup', stopTalking);
            pttButton.addEventListener('touchstart', (e) => { e.preventDefault(); startTalking(); });
            pttButton.addEventListener('touchend', (e) => { e.preventDefault(); stopTalking(); });

            // アプリを閉じた時に強制的に通話を終了させる
            onDisconnect(talkRef).set({ status: false, user: null });
        }

        // --- 他の人の状態を監視 ---
        function observeChannel() {
            onValue(talkRef, (snapshot) => {
                const data = snapshot.val();
                if (data && data.status) {
                    // 自分以外が話している場合（本当はID判定が必要ですが簡易化）
                    if (display.innerText !== "TALKING...") {
                        display.innerText = "RECEIVING...";
                        display.classList.add('receiving');
                        // ここで実際の音声ストリームを再生する処理（WebRTC等）を繋ぎます
                    }
                } else {
                    if (display.innerText !== "READY") {
                        display.innerText = "READY";
                        display.classList.remove('receiving');
                    }
                }
            });
        }

        // 実行
        initApp();
    </script>
</body>
</html>
